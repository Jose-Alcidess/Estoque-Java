<div class="main-layout">
  <div class="container">
    
    <section class="card-cadastro shadow-sm">
      <h2 class="titulo-sessao">🆕 Novo Produto</h2>
      
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Nome</label>
          <input [(ngModel)]="newProduct.name" class="form-control" placeholder="Ex: Teclado Mecânico">
        </div>
        
        <div class="col-md-3">
          <label class="form-label">Descrição</label>
          <input [(ngModel)]="newProduct.description" class="form-control" placeholder="Opcional">
        </div>
        
        <div class="col-md-2">
          <label class="form-label">Preço</label>
          <div class="input-group">
            <span class="input-group-text">R$</span>
            <input type="number" [(ngModel)]="newProduct.price" class="form-control">
          </div>
        </div>
        
        <div class="col-md-2">
          <label class="form-label">Quantidade</label>
          <input type="number" [(ngModel)]="newProduct.quantity" class="form-control">
        </div>
        
        <div class="col-md-2 d-flex align-items-end">
          <button (click)="addProduct()" class="btn btn-primary w-100 btn-adicionar" [disabled]="!newProduct.name">
            Adicionar
          </button>
        </div>
      </div>
    </section>

    <hr class="my-5">

    <section>
      <h2 class="titulo-sessao">📦 Estoque Atual</h2>
      <div class="table-responsive shadow-sm rounded">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Produto</th>
              <th scope="col">Descrição</th>
              <th scope="col">Preço</th>
              <th scope="col" class="text-center">Qtd</th>
              <th scope="col" class="text-center">Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of products">
              <td><span class="badge bg-light text-dark">#{{ p.id }}</span></td>
              <td class="fw-bold">{{ p.name }}</td>
              <td class="text-muted small">{{ p.description }}</td>
              <td>{{ p.price | currency:'BRL' }}</td>
              <td class="text-center">
                <span [class]="p.quantity > 0 ? 'badge bg-success' : 'badge bg-danger'">
                  {{ p.quantity }}
                </span>
              </td>
              <td class="text-center">
                <button (click)="deleteProduct(p.id!)" class="btn btn-outline-danger btn-sm rounded-pill">
                  Excluir
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      
      <div *ngIf="products.length === 0" class="empty-state text-center py-5">
        <p class="text-muted">Nenhum produto encontrado. Comece adicionando um acima!</p>
      </div>
    </section>

  </div>
</div>
