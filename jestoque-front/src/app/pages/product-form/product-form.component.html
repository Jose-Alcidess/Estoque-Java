<div class="row justify-content-center">
  <div class="col-md-10">
    <div class="card border-0 shadow-sm mt-4">
      <div class="card-body p-5">
        <h4 class="card-title fw-bold mb-4">🆕 Cadastrar Novo Produto</h4>

        <div class="row g-4">
          <div class="col-md-3">
            <label class="form-label fw-bold small">SKU (Interno)</label>
            <input [(ngModel)]="newProduct.sku" class="form-control" placeholder="EX: MOD-001">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold small">Nome do Produto</label>
            <input [(ngModel)]="newProduct.name" class="form-control" placeholder="Nome completo do item">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-bold small">EAN (Cód. Barras)</label>
            <input [(ngModel)]="newProduct.ean" class="form-control" placeholder="789...">
          </div>

          <div class="col-md-4">
            <label class="form-label fw-bold small">Preço de Venda (R$)</label>
            <input type="number" [(ngModel)]="newProduct.salePrice" class="form-control">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold small">Estoque Inicial</label>
            <input type="number" [(ngModel)]="newProduct.currentStock" class="form-control">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold small">Estoque Mínimo (Alerta)</label>
            <input type="number" [(ngModel)]="newProduct.minStock" class="form-control">
          </div>

          <div class="col-12 mt-5 d-flex justify-content-end gap-3">
            <button class="btn btn-light px-4" routerLink="/estoque">Cancelar</button>
            
            <button (click)="addProduct()" class="btn btn-primary px-5 fw-bold" [disabled]="!newProduct.sku || !newProduct.name">
              Salvar Produto
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
