<div class="max-w-3xl mx-auto space-y-6">
  
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-bold text-slate-800 tracking-tight">
        {{ isEditing ? 'Editar Produto' : 'Novo Produto' }}
      </h2>
      <p class="text-sm text-slate-500 mt-1">
        {{ isEditing ? 'Atualize as informações do item selecionado.' : 'Preencha os dados para cadastrar um novo item no estoque.' }}
      </p>
    </div>
    <a routerLink="/estoque" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors" title="Voltar">
      <i class="ph ph-x text-xl"></i>
    </a>
  </div>

  <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 sm:p-8">
    <form class="space-y-6">

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Nome do Produto <span class="text-rose-500">*</span></label>
        <input type="text" [(ngModel)]="newProduct.name" name="name" placeholder="Ex: Teclado Mecânico RGB"
               class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-slate-800 placeholder-slate-400">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Código SKU <span class="text-rose-500">*</span></label>
          <input type="text" [(ngModel)]="newProduct.sku" name="sku" placeholder="Ex: TEC-001"
                 class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-slate-800 uppercase placeholder-slate-400">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Preço de Venda (R$) <span class="text-rose-500">*</span></label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">R$</span>
            <input type="number" [(ngModel)]="newProduct.salePrice" name="salePrice" placeholder="0.00" step="0.01"
                   class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-slate-800">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Estoque Atual <span class="text-rose-500">*</span></label>
          <input type="number" [(ngModel)]="newProduct.currentStock" name="currentStock" placeholder="0"
                 class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-slate-800">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Estoque Mínimo Exigido <span class="text-rose-500">*</span></label>
          <input type="number" [(ngModel)]="newProduct.minStock" name="minStock" placeholder="0"
                 class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-slate-800 text-rose-600 font-medium">
        </div>
      </div>

      <hr class="border-slate-100 my-8">

      <div class="flex items-center justify-end gap-3 mt-8">
        <a routerLink="/estoque" class="px-5 py-2.5 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-xl hover:bg-slate-50 hover:text-slate-800 transition-colors">
          Cancelar
        </a>
        <button type="button" (click)="saveProduct()" class="px-6 py-2.5 text-sm font-medium text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 shadow-sm transition-colors flex items-center gap-2">
          <i class="ph-bold ph-check text-lg"></i>
          {{ isEditing ? 'Salvar Alterações' : 'Cadastrar Produto' }}
        </button>
      </div>

    </form>
  </div>
</div>
